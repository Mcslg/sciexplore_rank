    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "實時票數排名 2026 這樣教我就懂科學探究競賽",
            "description": "vibe code 的非官方依照票數排名的榜單，包含票數趨勢。可以投我們義大利麵結構力學一票嗎 QAQ",
            "url": "https://sciexplore-rank.vercel.app/"
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-microscope"></i>
                <span>SCIENCE EXPO 2026</span>
            </div>
            <h1>作品觀測儀表板</h1>
            
            <!-- 補回統計資訊 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="label">作品數量：</span>
                    <span id="total-works" class="value">--</span>
                </div>
                <div class="stat-item">
                    <span class="label">最後同步：</span>
                    <span id="update-time" class="value">--</span>
                </div>
                <div class="stat-item countdown-item">
                    <span class="label">投票截止：</span>
                    <span id="deadline-countdown" class="value">--</span>
                    <span class="deadline-note">05月05日(週二) 23:59</span>
                </div>
            </div>
            
            <!-- 分頁切換 -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('ranking')">
                    <i class="fas fa-list-ol"></i> 即時排行
                </button>
                <button class="tab-btn" onclick="switchTab('compare')">
                    <i class="fas fa-chart-line"></i> 關注對比 (<span id="follow-count">0</span>)
                </button>
            </div>
        </header>

        <!-- 排行分頁 -->
        <main id="ranking-view" class="tab-content active">
            <div class="card-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜尋作品名稱或編號...">
                </div>
                <div class="filter-box">
                    <select id="groupFilter" class="group-select">
                        <option value="all">所有組別</option>
                    </select>
                </div>
                <div class="filter-box">
                    <select id="fieldFilter" class="group-select">
                        <option value="all">所有領域</option>
                    </select>
                </div>
                <div class="filter-box">
                    <select id="sdgFilter" class="group-select">
                        <option value="all">所有 SDGs</option>
                    </select>
                </div>
                <button id="refreshBtn" class="refresh-button">
                    <i class="fas fa-sync-alt"></i> 重新載入
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="follow-col"><i class="far fa-star"></i></th>
                            <th class="rank-col">排名</th>
                            <th>作品資訊 / 學校</th>
                            <th class="group-col">組別</th>
                            <th class="vote-col">目前票數</th>
                            <th class="trend-col">趨勢圖</th>
                            <th class="growth-col">票數增長 (即時 / 上期)</th>
                            <th class="action-col">功能</th>
                        </tr>
                    </thead>
                    <tbody id="rankingBody"></tbody>
                </table>
            </div>
        </main>

        <!-- 對比分頁 -->
        <main id="compare-view" class="tab-content" style="display: none;">
            <div class="ranking-card">
                <div class="card-header">
                    <h3>關注作品趨勢對比</h3>
                    <button class="btn-secondary" onclick="clearFollows()">清空關注</button>
                </div>
                <div class="chart-container-large">
                    <canvas id="multiTrendChart"></canvas>
                    <p id="compareChartStatus" class="chart-status"></p>
                </div>
                <div id="compare-list" class="compare-tags">
                    <!-- 關注的作品標籤會出現在這 -->
                </div>
            </div>
        </main>

        <div id="loader" class="loader-overlay">
            <div class="spinner"></div>
            <p>正在同步數據...</p>
        </div>

        <div id="error-msg" class="error-overlay" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <p>無法連線至 API。請確認 Vercel Proxy 是否正常運作。</p>
        </div>

        <footer>
            <p>© 2026 科學探究競賽 排行榜系統</p>
            <p class="support-note">請支持「蛤？義大利麵也能扯到結構力學？」</p>
        </footer>
    </div>

    <!-- 趨勢圖 Modal -->
    <div id="trendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <canvas id="trendChart"></canvas>
                <p id="trendChartStatus" class="chart-status"></p>
            </div>
        </div>
    </div>

    <script src="ranking.js"></script>
</body>
</html>
