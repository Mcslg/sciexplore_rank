name: Track Votes

on:
  schedule:
    - cron: '7,22,37,52 * * * *'  # 每 15 分鐘執行一次
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios

      - name: Fetch and Record Votes
        run: node tracker.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.csv
          git commit -m "Auto-update votes: $(date)" || echo "No changes to commit"
          git push
